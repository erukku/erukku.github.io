name: Deploy to GitHub Pages

on:
  push:
    # 実行対象のブランチ名（secondRPG ブランチなら以下を書き換え）
    branches: [ "secondRPG" ]

# GitHub Actionsにページ公開の権限を与える
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行をキャンセルして最新のビルドのみを優先
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        # vite.config.ts の設定に基づいてビルドを実行
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Viteのデフォルト出力先フォルダ
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
